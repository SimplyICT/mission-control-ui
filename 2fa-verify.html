<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mission Control — Two-Factor Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap { width: 100%; max-width: 420px; padding: 24px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 40px; display: block; margin-bottom: 12px; }
    .logo-title { font-size: 24px; font-weight: bold; color: #f8fafc; }
    .logo-sub { font-size: 13px; color: #64748b; margin-top: 4px; }
    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 32px;
    }
    .card h2 { margin: 0 0 8px 0; font-size: 18px; color: #f8fafc; font-weight: bold; }
    .card p { color: #94a3b8; font-size: 13px; margin: 0 0 24px 0; line-height: 1.5; }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      font-size: 32px;
      font-family: monospace;
      letter-spacing: 10px;
      text-align: center;
      outline: none;
    }
    input[type="text"]:focus { border-color: #3b82f6; }
    .btn {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #2563eb; }
    .error-msg {
      background: #2d0a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.visible { display: block; }
    .hint {
      background: #0c1a2e;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      color: #60a5fa;
      margin-bottom: 18px;
    }
    .back-link { text-align: center; margin-top: 16px; }
    .back-link a { color: #64748b; font-size: 13px; text-decoration: none; }
    .back-link a:hover { color: #94a3b8; }
    .footer { text-align: center; color: #334155; font-size: 12px; margin-top: 24px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <span class="logo-icon">🔐</span>
    <div class="logo-title">Mission Control</div>
    <div class="logo-sub">Two-Factor Authentication</div>
  </div>
  <div class="card">
    <h2>Verify your identity</h2>
    <p>Enter the 6-digit code from your authenticator app (Google Authenticator, Authy, etc.).</p>

    <div class="error-msg __ERROR_CLASS__">__ERROR__</div>

    <div class="hint">&#128274; Code refreshes every 30 seconds</div>

    <form method="POST" action="/2fa-verify">
      <div class="form-group">
        <label for="code">Authenticator Code</label>
        <input
          type="text"
          id="code"
          name="code"
          maxlength="6"
          pattern="[0-9]{6}"
          inputmode="numeric"
          autocomplete="one-time-code"
          autofocus
          required
          placeholder="000000"
        >
      </div>
      <button type="submit" class="btn">Verify &amp; Sign In</button>
    </form>
  </div>
  <div class="back-link"><a href="/logout">&#8592; Cancel &amp; back to login</a></div>
  <div class="footer">Internal use only &bull; Mission Control Platform</div>
</div>
<script>
  // Auto-submit when 6 digits entered
  document.getElementById('code').addEventListener('input', function() {
    if (this.value.replace(/\D/g,'').length === 6) {
      this.value = this.value.replace(/\D/g,'');
      this.form.submit();
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Mission Control Audit Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>* { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .topbar {display:flex;justify-content:space-between;align-items:center;
      background: #111827;
      border-bottom: 1px solid #1e293b;
      padding: 18px 28px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .container {
      max-width: 1600px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 22px;
    }

    h1, h2, h3 {
      margin-top: 0;
      color: #f8fafc;
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-right: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .critical {
      color: #fca5a5;
      font-weight: bold;
    }

    .warning {
      color: #fcd34d;
      font-weight: bold;
    }

    .ok {
      color: #86efac;
      font-weight: bold;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
    }

    .tile {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px;
      font-weight: bold;
    }

    .tile span {
      display: block;
      font-size: 28px;
      margin-top: 8px;
      color: #f8fafc;
    }

    .issue-list p {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
      line-height: 1.45;
    }

    .muted {
      color: #94a3b8;
    }

    .table-wrap {
      overflow-x: auto;
      max-width: 100%;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #334155;
      padding: 8px;
      font-size: 12px;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: #1e293b;
      color: #f8fafc;
      position: sticky;
      top: 0;
    }

    .row-critical {
      background: rgba(220,38,38,0.12);
    }

    .row-warning {
      background: rgba(245,158,11,0.12);
    }

    .footer {
      text-align: center;
      color: #64748b;
      margin-top: 24px;
      font-size: 13px;
    }

    .status-line {
      color: #93c5fd;
      font-weight: bold;
    }

    @media print {
      body {
        background: white;
        color: black;
      }

      .no-print {
        display: none;
      }

      .card {
        border: 1px solid #ccc;
        box-shadow: none;
      }

      th {
        position: static;
      }
    }
  
.nav-btn{background:linear-gradient(135deg,rgba(0,229,255,0.25),rgba(33,150,243,0.35));color:#e7f6ff;border:1px solid rgba(0,229,255,0.35);border-radius:8px;padding:6px 14px;text-decoration:none;font-size:13px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:pointer}

.topbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
.nav-btn-home{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:pointer}

@media(max-width:1100px){.kpi{grid-column:span 4}}@media(max-width:700px){.kpi{grid-column:span 6}.topbar{flex-direction:column;align-items:stretch}.controls{justify-content:flex-start}input.api{min-width:100%}}
@media(max-width:1100px){.kpi{grid-column:span 4}}@media(max-width:700px){.kpi{grid-column:span 6}.topbar{flex-direction:column;align-items:stretch}.controls{justify-content:flex-start}input.api{min-width:100%}}


/* Platform universal styles */
:root{--bg:#07090d;--panel:rgba(18,24,34,.96);--border:rgba(84,214,255,.18);--text:#e7f6ff;--muted:#8fa6b5;--cyan:#00e5ff;--green:#00e676;--amber:#ffca28;--red:#ff1744;--blue:#2196f3}
*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:radial-gradient(circle at top left,rgba(0,229,255,.12),transparent 28%),radial-gradient(circle at top right,rgba(255,23,68,.10),transparent 30%),var(--bg);color:var(--text);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(5,8,13,.9);position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
.brand h1{margin:0;font-size:1.25rem;color:var(--cyan);letter-spacing:1px}.brand span{color:var(--muted);font-size:.78rem}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
input{background:#05070a;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 9px;outline:none;font-family:inherit}
button,a.button{background:linear-gradient(135deg,rgba(0,229,255,.25),rgba(33,150,243,.35));color:var(--text);border:1px solid rgba(0,229,255,.35);border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:700;text-decoration:none;display:inline-block;white-space:nowrap}
.nav-btn{background:linear-gradient(135deg,rgba(0,229,255,0.25),rgba(33,150,243,0.35));color:#e7f6ff;border:1px solid rgba(0,229,255,0.35);border-radius:8px;padding:6px 14px;text-decoration:none;font-size:13px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.nav-btn-home{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
@media(max-width:700px){.topbar{flex-direction:column;align-items:stretch}.controls{justify-content:flex-start}input.api{min-width:100%}}

</style>
</head>
<body>

<div class="topbar">
    <div class="brand">
      <h1>📄 
      <span></span>
    </div>
    <div class="controls">
      <a class="nav-btn-home" href="/index-platform.html">&#9664; Home</a>
      <a class="nav-btn" href="/help.html">? Help</a>
      <a class="nav-btn" href="/devdocs.html">DevDocs</a>
    </div>
  </div>    <div class="subtitle">Detailed Compliance Findings & Audit Evidence</div>

    
  </div>
  <div class="topbar-right">
    <a class="nav-btn" href="/help.html">? Help</a>
    <a class="nav-btn" href="/devdocs.html">DevDocs</a>
  </div>
</div>

<div class="container">

  <div class="card no-print">
    <div class="actions">
      <button onclick="goReports()">Back to Reports</button>
      <button onclick="window.print()">Print / Save PDF</button>
    </div>
    <div id="loadStatus" class="status-line">Loading audit report...</div>
  </div>

  <div id="content"></div>

  <div class="footer">
    Mission Control Audit Platform
  </div>

</div>

<script>
const API = "/audit-api";

function safe(value) {
  return value ?? "";
}

function getId() {
  const p = new URLSearchParams(window.location.search);
  return p.get("id");
}

function goReports() {
  window.location.href = "/audit-reports.html";
}

function rowClass(status) {
  if (status === "critical") return "row-critical";
  if (status === "warning") return "row-warning";
  return "";
}

function statusClass(s) {
  if (s === "Critical") return "critical";
  if (s === "Warning") return "warning";
  return "ok";
}

function statusText(s) {
  return s || "Unknown";
}

async function loadReport() {
  const id = getId();

  if (!id) {
    document.getElementById("loadStatus").textContent = "Missing audit report id.";
    return;
  }

  const res = await fetch(`${API}/audit-report/${id}`);

  if (!res.ok) {
    const text = await res.text();
    console.log(text);
    document.getElementById("loadStatus").textContent = "Could not load audit report.";
    return;
  }

  const report = await res.json();
  const div = document.getElementById("content");

  let rowsHtml = "";

  (report.rows || []).forEach(r => {
    rowsHtml += `
      <tr class="${rowClass(r.status)}">
        <td>${safe(r.serial_number)}</td>
        <td>${safe(r.device_name)}</td>
        <td>${safe(r.assigned_user_room)}</td>
        <td>${safe(r.status)}</td>
        <td>${(r.reasons || []).join(", ")}</td>
      </tr>
    `;
  });

  div.innerHTML = `
    <div class="card">
      <h2>${safe(report.site_name)}</h2>
      <p><b>Date:</b> ${safe(report.audit_date)}</p>
      <p class="${statusClass(report.overall_status)}">
        <b>Status:</b> ${statusText(report.overall_status)}
      </p>
      <p class="muted"><b>Batch:</b> ${safe(report.audit_batch_id)}</p>
    </div>

    <div class="card">
      <h3>Summary</h3>
      <div class="summary">
        <div class="tile">Total Devices<span>${safe(report.summary?.total_devices)}</span></div>
        <div class="tile">Critical<span>${safe(report.summary?.critical)}</span></div>
        <div class="tile">Warnings<span>${safe(report.summary?.warnings)}</span></div>
        <div class="tile">OK<span>${safe(report.summary?.ok)}</span></div>
      </div>
    </div>

    <div class="card">
      <h3>Critical Issues</h3>
      <div class="issue-list">
        ${(report.critical_incidents || []).length === 0 ? "<p class='muted'>None</p>" :
          report.critical_incidents.map(r =>
            `<p><b>${safe(r.serial_number)}</b> - ${safe(r.device_name)} (${safe(r.assigned_user_room)})<br>${(r.reasons || []).join(", ")}</p>`
          ).join("")
        }
      </div>
    </div>

    <div class="card">
      <h3>Warnings</h3>
      <div class="issue-list">
        ${(report.warnings || []).length === 0 ? "<p class='muted'>None</p>" :
          report.warnings.map(r =>
            `<p><b>${safe(r.serial_number)}</b> - ${safe(r.device_name)} (${safe(r.assigned_user_room)})<br>${(r.reasons || []).join(", ")}</p>`
          ).join("")
        }
      </div>
    </div>

    <div class="card">
      <h3>Recommendations</h3>
      <div class="issue-list">
        ${(report.recommendations || []).map(r => `<p>• ${safe(r)}</p>`).join("")}
      </div>
    </div>

    <div class="card">
      <h3>Full Audit Register</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Serial</th>
              <th>Device</th>
              <th>Room/User</th>
              <th>Status</th>
              <th>Reasons</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml || '<tr><td colspan="5">No audit rows found.</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById("loadStatus").textContent = "Audit report loaded.";
}

loadReport();
</script>

</body>
</html>

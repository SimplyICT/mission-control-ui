<!DOCTYPE html>
<html>
<head>
  <title>Mission Control Audit Reports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>* { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .topbar {display:flex;justify-content:space-between;align-items:center;
      background: #111827;
      border-bottom: 1px solid #1e293b;
      padding: 18px 28px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .container {
      max-width: 1500px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 22px;
    }

    h1, h2 {
      margin-top: 0;
      color: #f8fafc;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    select, button {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
    }

    select {
      min-width: 320px;
    }

    button {
      background: #2563eb;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .status-line {
      margin-top: 12px;
      font-weight: bold;
      color: #93c5fd;
    }

    .status-critical {
      color: #fca5a5;
      font-weight: bold;
    }

    .status-warning {
      color: #fcd34d;
      font-weight: bold;
    }

    .status-ok {
      color: #86efac;
      font-weight: bold;
    }

    .generated-yes {
      color: #4ade80;
      font-weight: bold;
    }

    .generated-no {
      color: #f87171;
      font-weight: bold;
    }

    .badge-in_progress { background: #1e3a5f; color: #93c5fd; border: 1px solid #2563eb; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
    .badge-finalized { background: #1a2e1a; color: #86efac; border: 1px solid #16a34a; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
    .action-btn-finalize { background: #f59e0b; border: none; font-weight: bold; cursor: pointer; padding: 4px 10px; border-radius: 6px; font-size: 11px; color:#0f172a; }
    .action-btn-reopen { background: #6366f1; border: none; font-weight: bold; cursor: pointer; padding: 4px 10px; border-radius: 6px; font-size: 11px; }
    .action-btn-finalize:hover { background: #d97706; }
    .action-btn-reopen:hover { background: #4f46e5; }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #334155;
      font-size: 12px;
      white-space: nowrap;
    }

    th {
      background: #1e293b;
      color: #f8fafc;
    }

    tr:nth-child(even) {
      background: rgba(15,23,42,0.5);
    }

    .footer {
      text-align: center;
      color: #64748b;
      margin-top: 24px;
      font-size: 13px;
    }
  
.nav-btn{background:linear-gradient(135deg,rgba(0,229,255,0.25),rgba(33,150,243,0.35));color:#e7f6ff;border:1px solid rgba(0,229,255,0.35);border-radius:8px;padding:6px 14px;text-decoration:none;font-size:13px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:pointer}

.topbar-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
.nav-btn-home{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:pointer}

@media(max-width:1100px){.kpi{grid-column:span 4}}@media(max-width:700px){.kpi{grid-column:span 6}.topbar{flex-direction:column;align-items:stretch}.controls{justify-content:flex-start}input.api{min-width:100%}}
@media(max-width:1100px){.kpi{grid-column:span 4}}@media(max-width:700px){.kpi{grid-column:span 6}.topbar{flex-direction:column;align-items:stretch}.controls{justify-content:flex-start}input.api{min-width:100%}}


/* Platform universal styles */
:root{--bg:#07090d;--panel:rgba(18,24,34,.96);--border:rgba(84,214,255,.18);--text:#e7f6ff;--muted:#8fa6b5;--cyan:#00e5ff;--green:#00e676;--amber:#ffca28;--red:#ff1744;--blue:#2196f3}
*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:radial-gradient(circle at top left,rgba(0,229,255,.12),transparent 28%),radial-gradient(circle at top right,rgba(255,23,68,.10),transparent 30%),var(--bg);color:var(--text);min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(5,8,13,.9);position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
.brand h1{margin:0;font-size:1.25rem;color:var(--cyan);letter-spacing:1px}.brand span{color:var(--muted);font-size:.78rem}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
input{background:#05070a;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 9px;outline:none;font-family:inherit}
button,a.button{background:linear-gradient(135deg,rgba(0,229,255,.25),rgba(33,150,243,.35));color:var(--text);border:1px solid rgba(0,229,255,.35);border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:700;text-decoration:none;display:inline-block;white-space:nowrap}
.nav-btn{background:linear-gradient(135deg,rgba(0,229,255,0.25),rgba(33,150,243,0.35));color:#e7f6ff;border:1px solid rgba(0,229,255,0.35);border-radius:8px;padding:6px 14px;text-decoration:none;font-size:13px;font-weight:700;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.nav-btn-home{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
@media(max-width:700px){.topbar{flex-direction:column;align-items:stretch}.controls{justify-content:flex-start}input.api{min-width:100%}}

</style>
</head>
<body>

<div class="topbar">
    <div class="brand">
      <h1>📊 
      <span></span>
    </div>
    <div class="controls">
      <a class="nav-btn-home" href="/index-platform.html">&#9664; Home</a>
      <a class="nav-btn" href="/help.html">? Help</a>
      <a class="nav-btn" href="/devdocs.html">DevDocs</a>
    </div>
  </div>    <div class="subtitle">Audit Reporting & Compliance Review</div>

    
  </div>
  <div class="topbar-right">
    <a class="nav-btn" href="/help.html">? Help</a>
    <a class="nav-btn" href="/devdocs.html">DevDocs</a>
  </div>
</div>

<div class="container">

<div class="card">
  <h2>Load Reports</h2>

  <div class="actions">
    <button onclick="goHome()">Home</button>

    <select id="siteSelect"></select>

    <button onclick="loadBatches()">Load Audit Batches</button>

    <button onclick="openActiveDeviceRegister()">
      Active Device Register
    </button>
  </div>

  <p id="reportStatus" class="status-line">
    Select a site to load audit reports.
  </p>
</div>

<div class="card">
  <h2>Audit Batches</h2>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Generate / Store</th>
          <th>Download</th>
          <th>View</th>
          <th>Batch Status</th>
          <th>Stored</th>
          <th>Status</th>
          <th>Critical</th>
          <th>Warnings</th>
          <th>Batch ID</th>
          <th>Site</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody id="batchTable"></tbody>
    </table>
  </div>
</div>

<div class="footer">
  Mission Control Audit Platform
</div>

</div>

<script>
const API = "/mission/audit-api";

function safe(v) {
  return v ?? "";
}

function goHome() {
  window.location.href = "/audit-index.html";
}

function openActiveDeviceRegister() {
  const siteId = document.getElementById("siteSelect").value;

  if (!siteId) {
    alert("Please select a site first.");
    return;
  }

  window.location.href =
    `/active-device-register.html?site_id=${encodeURIComponent(siteId)}`;
}

async function loadSites() {
  const res = await fetch(`${API}/sites`);
  const sites = await res.json();

  const select = document.getElementById("siteSelect");
  select.innerHTML = "";

  sites.forEach(site => {
    const option = document.createElement("option");
    option.value = site.site_id;
    option.textContent = site.site_name;
    select.appendChild(option);
  });

  document.getElementById("reportStatus").textContent =
    `Sites loaded: ${sites.length}`;
}

function statusClass(summary) {
  if ((summary?.critical || 0) > 0) return "status-critical";
  if ((summary?.warnings || 0) > 0) return "status-warning";
  return "status-ok";
}

function statusText(summary) {
  if ((summary?.critical || 0) > 0) return "Critical";
  if ((summary?.warnings || 0) > 0) return "Warning";
  return "OK";
}

async function loadBatches() {
  const siteId = document.getElementById("siteSelect").value;

  if (!siteId) {
    alert("Please select a site.");
    return;
  }

  document.getElementById("reportStatus").textContent =
    "Loading audit batches...";

  const res = await fetch(
    `${API}/audit-batches?site_id=${encodeURIComponent(siteId)}`
  );

  const batches = await res.json();

  const tbody = document.getElementById("batchTable");
  tbody.innerHTML = "";

  for (const batch of batches) {

    let report;

    try {
      const reportRes = await fetch(
        `${API}/audit-report/${batch.audit_batch_id}`
      );

      report = await reportRes.json();

    } catch (err) {
      console.log(err);
      continue;
    }

    const tr = document.createElement("tr");

    const summary = report.summary || {};

    tr.innerHTML = `
      <td>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          <button onclick="storeReport('${batch.audit_batch_id}')" style="font-size:11px;padding:4px 8px;">
            Generate
          </button>
          <button onclick="editAudit('${batch.audit_batch_id}')" style="background:#16a34a;font-size:11px;padding:4px 8px;">
            Edit
          </button>
          <button onclick="openRemediation('${batch.audit_batch_id}')" style="background:#8b5cf6;font-size:11px;padding:4px 8px;">
            Remediate
          </button>
          ${batch.status === "in_progress"
            ? `<button class="action-btn-finalize" onclick="finalizeBatch('${batch.audit_batch_id}')">Finalize</button>`
            : `<button class="action-btn-reopen" onclick="reopenBatch('${batch.audit_batch_id}')">Re-open</button>`}
        </div>
      </td>

      <td>
        <button onclick="downloadReport('${batch.audit_batch_id}')">
          Download PDF
        </button>
      </td>

      <td>
        <button onclick="viewReport('${batch.audit_batch_id}')">
          View
        </button>
      </td>

      <td>
        <span class="badge-${batch.status || "in_progress"}">${(batch.status || "in_progress") === "in_progress" ? "In Progress" : "Finalized"}</span>
      </td>

      <td class="${batch.report_generated ? "generated-yes" : "generated-no"}">
        ${batch.report_generated ? "YES" : "NO"}
      </td>

      <td class="${statusClass(summary)}">
        ${statusText(summary)}
      </td>

      <td>${summary.critical || 0}</td>

      <td>${summary.warnings || 0}</td>

      <td>${safe(batch.audit_batch_id)}</td>

      <td>${safe(batch.site_name)}</td>

      <td>${safe(batch.audit_date)}</td>
    `;

    tbody.appendChild(tr);
  }

  document.getElementById("reportStatus").textContent =
    `Loaded ${batches.length} audit batches.`;
}

async function storeReport(batchId) {
  const res = await fetch(
    `${API}/audit-report/store/${batchId}`,
    {
      method: "POST"
    }
  );

  if (!res.ok) {
    alert("Report generation failed.");
    return;
  }

  alert("Report generated and stored.");
  loadBatches();
}

function downloadReport(batchId) {
  window.open(
    `${API}/audit-report/executive-pdf/${batchId}`,
    "_blank"
  );
}

function viewReport(batchId) {
  window.location.href =
    `/audit-report-view.html?audit_batch_id=${encodeURIComponent(batchId)}`;
}

async function finalizeBatch(batchId) {
  if (!confirm("Finalize this audit batch?")) return;
  const res = await fetch(`${API}/audits/${batchId}/finalize`, { method: "POST" });
  if (!res.ok) { alert("Finalize failed."); return; }
  loadBatches();
}

async function reopenBatch(batchId) {
  if (!confirm("Re-open this audit batch?")) return;
  const res = await fetch(`${API}/audits/${batchId}/reopen`, { method: "POST" });
  if (!res.ok) { alert("Re-open failed."); return; }
  loadBatches();
}

function editAudit(batchId) {
  window.location.href = `/device-audit.html?audit_batch_id=${encodeURIComponent(batchId)}`;
}

function openRemediation(batchId) {
  window.location.href = `/audit-remediation.html?audit_batch_id=${encodeURIComponent(batchId)}`;
}

loadSites();
</script>

</body>
</html>

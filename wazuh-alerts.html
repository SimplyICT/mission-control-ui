<!DOCTYPE html>
<html>
<head>
  <title>Mission Control — Events &amp; Alerts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
  :root{--bg:#07090d;--bg-card:#111827;--bg-hover:#1e293b;--panel:rgba(18,24,34,.96);--border:rgba(84,214,255,.18);--text:#e7f6ff;--muted:#8fa6b5;--cyan:#00e5ff;--green:#00e676;--amber:#ffca28;--red:#ff1744;--blue:#2196f3;--sidebar-width:200px;--sidebar-collapsed:52px}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex}
  #app{display:flex;width:100%;min-height:100vh}
  /* ── Sidebar ── */
  .sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:#111827;border-right:1px solid #1e293b;display:flex;flex-direction:column;transition:width .2s,min-width .2s;overflow:hidden}
  .sidebar.collapsed{width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed)}
  .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1e293b}
  .logo{display:flex;align-items:center;gap:8px;white-space:nowrap}
  .logo-icon{font-size:18px;color:var(--cyan)}
  .logo-text{font-weight:700;font-size:14px;white-space:nowrap}
  .sidebar-toggle{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
  .sidebar-toggle:hover{background:var(--bg-hover);color:var(--text)}
  .sidebar.collapsed .logo-text,.sidebar.collapsed .nav-label{display:none}
  .sidebar.collapsed .sidebar-header{justify-content:center;padding:12px 0}
  .sidebar-nav{flex:1;padding:6px 0;overflow-y:auto}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;color:var(--muted);text-decoration:none;white-space:nowrap;border-left:3px solid transparent;font-size:13px}
  .nav-item:hover{background:var(--bg-hover);color:var(--text)}
  .nav-item.active{background:var(--bg-hover);color:var(--cyan);border-left-color:var(--cyan)}
  .nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
  .sidebar.collapsed .nav-item{justify-content:center;padding:9px 0}
  .sidebar-footer{border-top:1px solid #1e293b;padding:8px 0}
  .sidebar.collapsed .sidebar-footer{display:none}
  .sbtn-home{display:flex;align-items:center;gap:6px;padding:9px 14px;color:var(--muted);text-decoration:none;font-size:13px;white-space:nowrap;border-left:3px solid transparent}
  .sbtn-home:hover{background:var(--bg-hover);color:var(--text)}
  /* ── Main ── */
  .main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 20px;border-bottom:1px solid #1e293b;background:rgba(5,8,13,.9);position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
  .topbar-left .title{font-size:22px;font-weight:bold;color:#f8fafc}
  .topbar-left .subtitle{font-size:12px;color:var(--muted);margin-top:2px}
  .topbar-right{display:flex;gap:10px;align-items:center}
  .btn{padding:8px 18px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:13px;text-decoration:none;display:inline-block}
  .btn:hover{background:#334155}
  .container{max-width:1800px;margin:auto;padding:24px}
  .kpi-strip{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:22px}
  .kpi-box{background:#111827;border:1px solid #1e293b;border-radius:12px;padding:16px 24px;min-width:140px;text-align:center;flex:1}
  .kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .kpi-value{font-size:28px;font-weight:bold;margin:6px 0}
  .text-green{color:#22c55e}.text-red{color:#ef4444}.text-amber{color:#f59e0b}.text-blue{color:#3b82f6}.text-muted{color:var(--muted)}
  .card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:22px;margin-bottom:22px}
  .card h2{margin:0 0 16px 0;font-size:18px;color:#f8fafc}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:10px 12px;border-bottom:1px solid #1e293b;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer}
  th:hover{color:#e2e8f0}
  td{padding:10px 12px;border-bottom:1px solid #1e293b1a;font-size:13px}
  tr:hover{background:#1e293b40}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-green{background:#22c55e22;color:#22c55e}.badge-red{background:#ef444422;color:#ef4444}
  .badge-amber{background:#f59e0b22;color:#f59e0b}.badge-gray{background:#64748b22;color:var(--muted)}
  .badge-blue{background:#3b82f622;color:#3b82f6}
  .filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .filter-tab{padding:6px 14px;border-radius:8px;border:1px solid #334155;background:transparent;color:var(--muted);cursor:pointer;font-size:12px}
  .filter-tab:hover{background:#1e293b;color:#e2e8f0}
  .filter-tab.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
  .loading{text-align:center;padding:40px;color:var(--muted)}
  .error{text-align:center;padding:40px;color:#ef4444}
  .nowrap{white-space:nowrap}
  @media(max-width:900px){.kpi-strip{flex-direction:column}}
  @media(max-width:768px){.sidebar{width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed)}.sidebar .logo-text,.sidebar .nav-label{display:none}.sidebar-footer{display:none}}

</style>
</head>
<body>
<div id="app">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><span class="logo-icon">&#9733;</span><span class="logo-text">Wazuh SOC</span></div>
      <button id="toggleSidebar" class="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
    </div>
    <nav class="sidebar-nav">
      <a href="/wazuh-dashboard.html" class="nav-item"><span class="nav-icon">&#9632;</span><span class="nav-label">Dashboard</span></a>
      <a href="/wazuh-alerts.html" class="nav-item active"><span class="nav-icon">&#9889;</span><span class="nav-label">Events &amp; Alerts</span></a>
      <a href="/wazuh-autopilot.html" class="nav-item"><span class="nav-icon">&#9729;</span><span class="nav-label">SOC Autopilot</span></a>
      <a href="/wazuh-soc.html" class="nav-item"><span class="nav-icon">&#9679;</span><span class="nav-label">Full SOC</span></a>
    </nav>
    <div class="sidebar-footer">
      <a class="sbtn-home" href="/">&#9664; Home</a>
    </div>
  </aside>
  <div class="main-wrap">
    <div class="topbar">
      <div class="topbar-left">
        <div class="title">&#9889; Events &amp; Alerts</div>
        <div class="subtitle">Wazuh SIEM — Real-time alert monitoring</div>
      </div>
      <div class="topbar-right">
        <button class="btn" onclick="loadAlerts()">&#8635; Refresh</button>
        <a href="/wazuh-dashboard.html" class="btn">&#8598; Security Center</a>
      </div>
    </div>
    <div class="container">
    <div id="kpiStrip" class="kpi-strip"><div class="loading">Loading...</div></div>
    <div class="card">
      <div class="card-header">
        <h2 style="margin:0">Recent Alerts</h2>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterEvents('all',this)">All</button>
          <button class="filter-tab" onclick="filterEvents('critical',this)">Critical</button>
          <button class="filter-tab" onclick="filterEvents('high',this)">High</button>
          <button class="filter-tab" onclick="filterEvents('medium',this)">Medium</button>
          <button class="filter-tab" onclick="filterEvents('low',this)">Low</button>
        </div>
      </div>
      <div id="eventsTable"><div class="loading">Loading alerts...</div></div>
    </div>
  </div>

<script>
/* ── Sidebar toggle ── */
document.getElementById('toggleSidebar').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

var API = '/mission/wazuh-api';

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function severityBadge(s) {
  s = (s || '').toLowerCase();
  var m = { critical: 'badge-red', high: 'badge-amber', medium: 'badge-blue', low: 'badge-gray' };
  return '<span class="badge ' + (m[s] || 'badge-gray') + '">' + s + '</span>';
}

function formatDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString();
}

function api(path) {
  return fetch(API + path, {credentials: 'include'}).then(function(r) {
    if (!r.ok) throw new Error('API ' + r.status);
    return r.json();
  }).then(function(d) { return d.data || d; });
}

function loadAlerts() {
  Promise.all([api('/events?size=200'), api('/events/stats')]).then(function(res) {
    var events = res[0], stats = res[1];
    var items = events.affected_items || [];
    var sev = stats.severity || {};
    renderKPIs(sev);
    renderEvents(items);
  }).catch(function(e) {
    document.getElementById('kpiStrip').innerHTML = '<div class="error">Failed: ' + esc(e.message) + ' — <button class="btn" onclick="loadAlerts()">Retry</button></div>';
    document.getElementById('eventsTable').innerHTML = '<div class="error">' + esc(e.message) + '</div>';
  });
}

function renderKPIs(sev) {
  document.getElementById('kpiStrip').innerHTML =
    '<div class="kpi-box"><div class="kpi-label">Critical (12+)</div><div class="kpi-value text-red">' + (sev.Critical||0) + '</div></div>' +
    '<div class="kpi-box"><div class="kpi-label">High (7-11)</div><div class="kpi-value text-amber">' + (sev.High||0) + '</div></div>' +
    '<div class="kpi-box"><div class="kpi-label">Medium (4-6)</div><div class="kpi-value text-blue">' + (sev.Medium||0) + '</div></div>' +
    '<div class="kpi-box"><div class="kpi-label">Low (0-3)</div><div class="kpi-value text-muted">' + (sev.Low||0) + '</div></div>';
}

function renderEvents(items) {
  var h = '<table><thead><tr><th>Time</th><th>Level</th><th>Rule</th><th>Description</th><th>Agent</th><th>Groups</th></tr></thead><tbody id="eventsBody">';
  for (var i = 0; i < items.length; i++) {
    var e = items[i];
    var lvl = e.level || 0;
    var sv = lvl >= 12 ? 'critical' : lvl >= 7 ? 'high' : lvl >= 4 ? 'medium' : 'low';
    h += '<tr data-severity="' + sv + '">' +
      '<td class="nowrap">' + formatDate(e.timestamp) + '</td>' +
      '<td>' + severityBadge(sv) + '</td>' +
      '<td>' + esc(e.rule_id || '-') + '</td>' +
      '<td>' + esc((e.description || '').substring(0, 80)) + '</td>' +
      '<td>' + esc(e.agent ? (e.agent.name || e.agent.id || '-') : '-') + '</td>' +
      '<td>' + esc((e.groups || []).slice(0,3).join(', ')) + '</td></tr>';
  }
  h += '</tbody></table>';
  document.getElementById('eventsTable').innerHTML = h;
}

function filterEvents(sev, el) {
  var tabs = document.querySelectorAll('.filter-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  el.classList.add('active');
  var rows = document.querySelectorAll('#eventsBody tr');
  for (var i = 0; i < rows.length; i++) {
    rows[i].style.display = (sev === 'all' || rows[i].getAttribute('data-severity') === sev) ? '' : 'none';
  }
}

loadAlerts();
</script>
</div></div>
</body>
</html>

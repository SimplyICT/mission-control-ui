<!DOCTYPE html>
<html>
<head>
  <title>Mission Control — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 12px;
    }

    .logo-title {
      font-size: 24px;
      font-weight: bold;
      color: #f8fafc;
    }

    .logo-sub {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 18px;
      padding: 32px;
    }

    .card h2 {
      margin: 0 0 24px 0;
      font-size: 18px;
      color: #f8fafc;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    input:focus {
      border-color: #3b82f6;
    }

    input[type="password"] {
      font-family: monospace;
      letter-spacing: 2px;
    }

    .btn {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn:hover {
      background: #2563eb;
    }

    .error-msg {
      background: #2d0a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .footer {
      text-align: center;
      color: #334155;
      font-size: 12px;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="logo">
    <span class="logo-icon">&#127760;</span>
    <div class="logo-title">Mission Control</div>
    <div class="logo-sub">Network Monitoring &bull; Device Auditing &bull; Compliance</div>
  </div>

  <div class="card">
    <h2>Sign in</h2>

    <div class="error-msg __ERROR_CLASS__">__ERROR__</div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
  </div>

  <div class="footer">Internal use only &bull; Mission Control Platform</div>

</div>

</body>
</html>
